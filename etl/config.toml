[general]
download_images = false
log_level = "INFO"
raw_data_path = "data/raw"
processed_data_path = "data/processed"

[automation]
interval = 24 # Amount of time (in hours) between pipeline runs

[sources.inaturalist]
name = "inaturalist"
enabled = true
refetch = true
fetch_mode = "diseased"
base_url = "https://api.inaturalist.org/v1"
taxon_id = 47126        # Plantae
project_ids = [49595, 124267, 227684, 47428, 255039, 27611]
per_page = 200          # максимум дозволений API
target_count = 5000
rate_limit_seconds = 5.0

[[sources.local_sources]]
enabled = false
name = "ccmt_ghana"
root_path = "data/raw/ccmt"
include_glob = "**/*.jpg"
healthy_regex = "[A-Z][a-z]+_healthy"
default_is_diseased = true
provenance = "Field"

[[sources.yolo_sources]]
enabled = false
name = "mcdd_india"
root_path = "data/raw/mcdd/Multi-Crop Disease Dataset/Multicrop Disease Dataset/Multicrop Disease Dataset"
provenance = "Field"

[[sources.metadata_sources]]
enabled = false
name = "plantseg"
metadata_path = "data/raw/plantseg/plantseg/Metadata.csv"
images_root = "data/raw/plantseg/plantseg/images"
column_mapping = { external_id = "Name", image_path = "Name", status = "Disease", label = "Disease" }
default_is_diseased = true
provenance = "Laboratory"

[load]
format = "sqlite"
target_path = "data/processed/observations.db"
table_name = "observations"
